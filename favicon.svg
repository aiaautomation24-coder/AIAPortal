<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4878F0"/>
      <stop offset="100%" style="stop-color:#7B52F5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <rect width="512" height="256" rx="0" fill="url(#shine)" clip-path="url(#rounded)"/>

  <!-- AIA Text -->
  <text
    x="256" y="300"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="190"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-8"
    opacity="1"
  >AIA</text>

  <!-- Subtle bottom bar accent -->
  <rect x="120" y="360" width="272" height="10" rx="5" fill="#ffffff" opacity="0.25"/>
</svg>
